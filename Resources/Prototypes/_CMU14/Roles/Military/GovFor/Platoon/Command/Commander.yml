- type: job
  abstract: true
  parent: AU14JobPlatCoBaseAbstract
  id: AU14JobPlatCoBase
  roundRole: PlatoonCommander
  roundProfiles:
  - AU14RoundJobProfileMilitaryBase
  roundComponents:
  - type: CommendationGiver
  - type: InnateCommandSpeech
  - type: Skills
    preset: AU14SkillPresetPlatoonCommander
  - type: JobPrefix
    prefix: au14-job-prefix-govforplatco
  - type: AU14SilenceOrderAbility
  - type: AU14CallToAttentionAbility
    attentionFocusPriority: 300
  - type: AU14CallToAttentionImmune
  - type: RMCSpeechBubbleSpecificStyle
    speechStyleClass: commanderSpeech
  - type: TacticalMapIcon
    icon:
      sprite: /Textures/_AU14/Interface/au14govforjobicons.rsi
      state: govfor_platco
  roundForceComponents:
    OPFOR:
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_AU14/Interface/au14opforjobicons.rsi
        state: platco
    UPP:
    - type: JobPrefix
      prefix: au14-job-prefix-AU14JobGOVFORPlatCoUPP
    WYPMC:
    - type: JobPrefix
      prefix: au14-job-prefix-AU14JobGOVFORPlatCoWYPMC
    CMBCIU:
    - type: JobPrefix
      prefix: au14-job-prefix-AU14JobGOVFORPlatCoCMBCIU
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 18000 # 5 hours
  - !type:AgeRequirement
    requiredAge: 30
  - !type:TraitsRequirement
    inverted: true
    traits:
    - SocialAnxiety
    - SocialAnxietyHeavy
    - FrontalLisp
    - NonResuscitable
    - Epilepsy
    - NoEnglish
  ranks:
    RMCRankCivilian: []
  chevrons:
    RMCRankLieutenantColonel:
      entity: AU14ChevronLieutenantColonel
      requirements:
      - !type:RoleTimeRequirement
        role: AU14JobGOVFORPlatCo
        time: 180000 # 50 hours
    RMCRankMajor:
      entity: AU14ChevronMajor
      requirements: []

- type: playTimeTracker
  id: AU14JobGOVFORPlatCo
  isHumanoid: true

