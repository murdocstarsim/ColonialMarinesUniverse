    #   prefix: au14-job-prefix-govforintelWYPMC
    # CMBCIU:
    # - type: JobPrefix
    #   prefix: au14-job-prefix-govforintelCMBCIU
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 18000 # 5 hours
  - !type:AgeRequirement
    requiredAge: 25
  - !type:TraitsRequirement
    inverted: true
    traits:
    - SocialAnxiety
    - SocialAnxietyHeavy
    - FrontalLisp
    - NonResuscitable
