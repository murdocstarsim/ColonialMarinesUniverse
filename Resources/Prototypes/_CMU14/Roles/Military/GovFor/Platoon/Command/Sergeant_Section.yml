      prefix: au14-job-prefix-AU14JobGOVFORSectionSergeantCMBCIU

  requirements:
  - !type:OverallPlaytimeRequirement
    time: 18000 # 5 hours
  - !type:TraitsRequirement
    inverted: true
    traits:
    - SocialAnxietyHeavy
    - FrontalLisp
    - NonResuscitable
    - Epilepsy
    - NoEnglish
    - CMUProstheticLeftArm
    - CMUProstheticRightArm
    - CMUProstheticLeftLeg
    - CMUProstheticRightLeg
  ranks:
    RMCRankCivilian: []
  chevrons:
    RMCRankStaffSergeant:
