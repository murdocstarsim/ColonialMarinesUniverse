  roundComponents:
  - type: CommendationGiver
  - type: InnateCommandSpeech
  - type: AU14SilenceOrderAbility
  - type: AU14CallToAttentionAbility
  - type: AU14CallToAttentionImmune
  - type: Skills
    preset: AU14SkillPresetOfficerAdjutant
  - type: JobPrefix
    prefix: au14-job-prefix-govforadjutant
  - type: RMCSpeechBubbleSpecificStyle
    speechStyleClass: commanderSpeech
  - type: TacticalMapIcon
    icon:
      sprite: /Textures/_AU14/Interface/au14govforjobicons.rsi
      state: govfor_adj
  roundForceComponents:
    OPFOR:
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_AU14/Interface/au14opforjobicons.rsi
        state: adj
    # UPP:
    # - type: JobPrefix
    #   prefix: au14-job-prefix-govforadjutantUPP
    # WYPMC:
    # - type: JobPrefix
    #   prefix: au14-job-prefix-govforadjutantWYPMC
    # CMBCIU:
    # - type: JobPrefix
    #   prefix: au14-job-prefix-govforadjutantCMBCIU
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 18000 # 5 hours
  - !type:AgeRequirement
    requiredAge: 30
  - !type:TraitsRequirement
    inverted: true
    traits:
    - SocialAnxiety
    - SocialAnxietyHeavy
    - FrontalLisp
    - NonResuscitable
    - Epilepsy
    - NoEnglish
  ranks:
    RMCRankCivilian: []
  chevrons:
    RMCRankCaptain:
      entity: AU14ChevronCaptain
      requirements: []

- type: playTimeTracker
