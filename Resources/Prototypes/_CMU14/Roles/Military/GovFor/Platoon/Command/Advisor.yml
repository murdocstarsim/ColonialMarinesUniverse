- type: job
  abstract: true
  parent: AU14JobMilitaryBase
  id: AU14JobadvisorBaseAbstract
  name: au14-job-name-govforadvisor
  description: au14-job-description-govforadvisor
  icon: "AU14JobIconGovAdvisor"
  spawnMenuRoleName: Platoon Advisor (GOVFOR)
  startingGear: AU14GearGOVFORadvisor
  dummyStartingGear: AU14GearGOVFORadvisorDummy
  playTimeTracker: AU14JobGOVFORadvisor
  requireAdminNotify: true
  whitelisted: true
  canBeAntag: false
  accessGroups:
  - AU14GovforCommand
  - aulegacygroupcommand

- type: job
  abstract: true
  parent: AU14JobadvisorBaseAbstract
  id: AU14JobadvisorBase
  roundRole: Advisor
  roundProfiles:
  - AU14RoundJobProfileMilitaryBase
  roundComponents:
  - type: SeeNewPlayers
  - type: Skills
    preset: AU14SkillPresetPlatoonAdvisor
  - type: RMCSpeechBubbleSpecificStyle
    speechStyleClass: commanderSpeech
  - type: JobPrefix
    prefix: au14-job-prefix-govforadvisor
  - type: TacticalMapIcon
    icon:
      sprite: /Textures/_AU14/Interface/au14govforjobicons.rsi
      state: govfor_advisor
  roundForceComponents:
    OPFOR:
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_AU14/Interface/au14opforjobicons.rsi
        state: advisor
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 3600
  - !type:AgeRequirement
    requiredAge: 25
  - !type:TraitsRequirement
    inverted: true
    traits:
    - Epilepsy
    - NoEnglish
  ranks:
    RMCRankCivilian: []
  chevrons:
    RMCRankSergeantMajor:
      entity: AU14ChevronUSCMSergeantMajor
      requirements:
      - !type:RoleTimeRequirement
        role: AU14JobGOVFORadvisor
        time: 180000 # 50 hours
    RMCRankFirstSergeant:
      entity: AU14ChevronUSCMFirstSergeant
      requirements:
      - !type:RoleTimeRequirement
        role: AU14JobGOVFORadvisor
        time: 144000 # 40 hours
    RMCRankMasterGunnerySergeant:
      entity: AU14ChevronUSCMMasterGunnerySergeant
      requirements:
      - !type:RoleTimeRequirement
        role: AU14JobGOVFORadvisor
        time: 108000 # 30 hours
    RMCRankMasterSergeant:
      entity: AU14ChevronUSCMMasterSergeant
      requirements:
      - !type:RoleTimeRequirement
        role: AU14JobGOVFORadvisor
        time: 72000 # 20 hours
    RMCRankGunnerySergeant:
      entity: AU14ChevronUSCMGunnerySergeant
      requirements:
      - !type:RoleTimeRequirement
        role: AU14JobGOVFORadvisor
        time: 36000 # 10 hours
    RMCRankStaffSergeant:
      entity: AU14ChevronUSCMStaffSergeant
      requirements: []

- type: playTimeTracker
  id: AU14JobGOVFORadvisor
  isHumanoid: true

