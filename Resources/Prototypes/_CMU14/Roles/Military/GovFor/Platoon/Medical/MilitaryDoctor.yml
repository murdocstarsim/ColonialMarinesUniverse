- type: job
  abstract: true
  parent: AU14JobMilitaryBaseAbstract
  id: AU14JobMilitaryDoctorBase
  roundRole: MilitaryDoctor
  roundProfiles:
  - AU14RoundJobProfileMilitaryBase
  roundComponents:
  - type: Skills
    preset: AU14SkillPresetMilitaryDoctor
  - type: JobPrefix
    prefix: au14-job-prefix-govforMilitaryDoctor
  - type: TacticalMapIcon
    icon:
      sprite: /Textures/_AU14/Interface/au14govforjobicons.rsi
      state: govfor_doctor
  roundForceComponents:
    OPFOR:
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_AU14/Interface/au14opforjobicons.rsi
        state: doctor
  requirements:
  - !type:AgeRequirement
    requiredAge: 25
  - !type:TraitsRequirement
    inverted: true
    traits:
    - NonResuscitable
    - Epilepsy
    - NoEnglish
  ranks:
    RMCRankCivilian: []
  chevrons:
    RMCRankFirstLT:
      entity: AU14ChevronFirstLT
      requirements:
      - !type:RoleTimeRequirement
        role: AU14JobGOVFORMilitaryDoctor
        time: 86400 # 24 hours
    RMCRankSecondLT:
      entity: AU14ChevronSecondLT
      requirements: []

- type: playTimeTracker
  id: AU14JobGOVFORMilitaryDoctor
  isHumanoid: true

- type: startingGear
