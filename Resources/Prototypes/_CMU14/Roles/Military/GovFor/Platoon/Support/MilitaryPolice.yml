    prefix: au14-job-prefix-govformilitarypoliceman
  - type: TacticalMapIcon
    icon:
      sprite: /Textures/_AU14/Interface/au14govforjobicons.rsi
      state: govfor_mp
  roundForceComponents:
    OPFOR:
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_AU14/Interface/au14opforjobicons.rsi
        state: mp

  requirements:
  - !type:AgeRequirement
    requiredAge: 21
  - !type:TraitsRequirement
    inverted: true
    traits:
    - NonResuscitable
    - Epilepsy
    - NoEnglish
  ranks:
    RMCRankCivilian: []
  chevrons:
    RMCRankStaffSergeant:
      entity: AU14ChevronUSCMStaffSergeant
      requirements:
      - !type:RoleTimeRequirement
        role: AU14JobGOVFORMilitaryPoliceMan
        time: 86400 # 24 hours
    RMCRankSergeant:
      entity: AU14ChevronUSCMSergeant
      requirements:
      - !type:RoleTimeRequirement
        role: AU14JobGOVFORMilitaryPoliceMan
        time: 36000 # 10 hours
    RMCRankCorporal:
      entity: AU14ChevronUSCMCorporal
      requirements: []

