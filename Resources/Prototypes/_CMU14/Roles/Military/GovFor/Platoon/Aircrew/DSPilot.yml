  chevrons:
    RMCRankChiefWarrantOfficer3:
      entity: AU14ChevronUSCMChiefWarrantOfficer3
      requirements:
      - !type:RoleTimeRequirement
        role: AU14JobGOVFORDSPilot
        time: 36000 #10 hours
