- type: job
  abstract: true
  parent: AU14JobMilitaryBase
  id: CMUJobDroneOperatorBaseAbstract
  name: cmu-job-name-govfordroneoperator
  description: cmu-job-description-govfordroneoperator
  icon: "AU14JobIconGovRifleman"
  spawnMenuRoleName: Drone Operator (GOVFOR)
  startingGear: CMUGearGOVFORDroneOperator
  dummyStartingGear: CMUGearGOVFORDroneOperatorDummy
  playTimeTracker: CMUJobGOVFORDroneOperator
  accessGroups:
  - AU14GovforSquad

- type: job
  abstract: true
  parent: CMUJobDroneOperatorBaseAbstract
  id: CMUJobDroneOperatorBase
  roundRole: DroneOperator
  roundProfiles:
  - AU14RoundJobProfileMilitaryBase
  roundComponents:
  - type: CMUDroneOperator
  - type: Skills
    preset: AU14SkillPresetPlatoonCombatTechnician
  - type: JobPrefix
    prefix: cmu-job-prefix-govfordroneoperator
  - type: TacticalMapIcon
    icon:
      sprite: /Textures/_AU14/Interface/au14govforjobicons.rsi
      state: rifleman

  requirements:
  - !type:TraitsRequirement
    inverted: true
    traits:
    - Epilepsy
    - NoEnglish
  ranks:
    RMCRankCivilian: []
  chevrons:
    RMCRankStaffSergeant:
      entity: AU14ChevronUSCMStaffSergeant
      requirements:
      - !type:RoleTimeRequirement
        role: CMUJobGOVFORDroneOperator
        time: 36000 # 10 hours
    RMCRankSergeant:
      entity: AU14ChevronUSCMSergeant
      requirements: []

- type: playTimeTracker
  id: CMUJobGOVFORDroneOperator
  isHumanoid: true

- type: startingGear
  id: CMUGearGOVFORDroneOperator
  equipment:
    id: CMUIDCardDroneOperator
    ears: AU14HeadsetGovforMarine

- type: startingGear
  id: CMUGearGOVFORDroneOperatorDummy
