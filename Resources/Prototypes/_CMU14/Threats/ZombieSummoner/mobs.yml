- type: entity
  save: false
  parent: CMMobHuman
  id: CMUZombieSummoner
  name: zombie summoner
  description: A death-touched humanoid capable of calling the dead back to their feet.
  components:
  - type: GhostTakeoverAvailable
  - type: GhostRole
    name: Zombie Summoner
    description: Regenerate points and spend them to summon zombies.
    makeSentient: true
    allowSpeech: true
    allowMovement: true
    raffle:
      settings: short
  - type: RandomHumanoidAppearance
    randomizeName: true
  - type: RandomHumanoidAppearanceWhitelisted
    allowedMaleHairStyles:
    - RMCHumanHairCrew
    - RMCHumanHairShort
    - RMCHumanHairCut
    - RMCHumanHairFlair
    - RMCHumanHairParted
    - RMCHumanHairCleancut
    - RMCHumanHairBedhead
    - RMCHumanHairCombover
    - RMCHumanHairFather
    - RMCHumanHairCurls
    - RMCHumanHairJensen
    - RMCHumanHairGelled
    - RMCHumanHairSpiky
    - RMCHumanHairHighAndTight
    - RMCHumanHairMarineFade
    - RMCHumanHairWardaddy
    - RMCHumanHairUndercut
    - RMCHumanHairTaper
    - RMCHumanHairAverageJoe
    allowedFemaleHairStyles:
    - RMCHumanHairShortbangs
    - RMCHumanHairBobcurl
    - RMCHumanHairMarineBun
    - RMCHumanHairBun
    - RMCHumanHairFringetail
    - RMCHumanHairPonytail1
    - RMCHumanHairPonytail7
    - RMCHumanHairLong
    - RMCHumanHairPixieCutLeft
    - RMCHumanHairPixieCutRight
    - RMCHumanHairScully
    - RMCHumanHairLongAlt
    - RMCHumanHairLonger
    - RMCHumanHairSidePonytail
    - RMCHumanHairParted
    - RMCHumanHairBedhead2
    - RMCHumanHairCurls
    - RMCHumanHairHimecut
    - RMCHumanHairBraid2
    - RMCHumanHairRowBraid
    allowedHairColorsHex:
    - "#0B0B0B"
    - "#1A1A1A"
    - "#222222"
    - "#2B1B0F"
    - "#3B2314"
    - "#4A2E1A"
    - "#5A3A22"
    - "#6B4A2F"
    - "#9C8651"
    - "#B79A5A"
    - "#4A1F12"
    - "#7A5E42"
    allowedEyeColorsHex:
    - "#a52a2a"
    - "#808080"
    - "#f0ffff"
    - "#4682b4"
    - "#000000"
  - type: EquipEntityPreset
    preset: CMUZombieSummonerMilitaryUniformPreset
  - type: ZombieImmune
  - type: NpcFactionMember
    factions:
    - Zombie
  - type: NightVision
    alert: XenoNightVision
    overlay: true
  - type: Skills
    skills:
      RMCSkillFirearms: 3
      RMCSkillMedical: 2
      RMCSkillSurgery: 2
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Critical
      175: Dead
  - type: MobStateActions
    actions:
      Critical:
      - CMActionGhost
      Dead:
      - CMActionGhost
  - type: ZombieSummoner
    points: 200
    maxPoints: 200
    zombieCost: 10
    militaryZombieCost: 20
    pointsPerSecond: 0.4
    maxControlledZombies: 20
    zombiePrototype: CMUZombieSummonerInfected
    militaryZombiePrototype: CMUZombieSummonerMilitaryInfected
    zombieWeaponPrototypes:
    - CMScrewdriver
    - CMWrench
    - CMWirecutter
    - RMCKitchenKnife
    - RMCKitchenKnifeChef
    - RMCKitchenKnifeButcher
    - RMCToolHatchet
    - AU14ToolMachete
    - CMM2132Machete
    - RMCFireAxe
    - CMCrowbar
    militaryZombieWeaponPrototypes:
    - RMCFireAxe
    - CMM2132Machete
    - RMCM2100Machete
    - AU14ToolMachete
    - RMCM5Bayonet
    - CMM11Knife
    - RMCCombatUtilityKnifeA
    - RMCCombatUtilityKnifeB
    - RMCIceAxe
    zombieFaceMarking: CMUZombieSummonerBloodyCross
    zombieFaceMarkingColor: "#c00000"
    startsWithFaceMark: true
    zombieBonusMeleeDamage:
      types:
        Slash: 25
    zombieDelimbChance: 0.01
    zombieHitScreamChance: 0.5
    zombieMovementSpeedModifier: 1
    militaryZombieMovementSpeedModifier: 1
    eyeColors:
    - "#a52a2a"
    - "#808080"
    - "#f0ffff"
    - "#4682b4"
    - "#000000"
  - type: UserInterface
    interfaces:
      enum.ZombieSummonerUiKey.Key:
        type: ZombieSummonerBui
        requireInputValidation: false

