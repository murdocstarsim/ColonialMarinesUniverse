- type: entity
  id: CMUZLevelEye
  save: false
  categories: [ HideSpawnMenu ]
  components:
  - type: Transform
    gridTraversal: false

- type: entity
  id: CMUMultiZStairs
  name: multi-Z stairs
  description: A stairway that connects Z-levels.
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Clickable
  - type: Sprite
    sprite: _RMC14/Structures/stairs.rsi
    state: p_stair_full
    drawdepth: FloorTiles
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      slowdown:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        layer:
        - SlipLayer
        mask:
        - ItemMask
        density: 1000
        hard: false
  - type: CMUZLevelHighGround
    heightCurve:
    - 1.05
    - 1.05
    - 0.575
    - 0.1
    stick: true
  - type: SpeedModifierContacts
    walkSpeedModifier: 0.6
    sprintSpeedModifier: 0.6

- type: entity
  parent: CMUMultiZStairs
  id: CMUMultiZStairsNoPreview
  suffix: No preview
  components:
  - type: CMUZLevelHighGround
    previewUpLevel: false

- type: entity
  parent: CMUMultiZStairsNoPreview
  id: CMUMultiZStairsSolo
  components:
  - type: Sprite
    drawdepth: WallMountedItems
    noRot: true
    sprite: _CMU14/Structures/stairs.rsi
    state: p_stair_solo_cap
    offset: 0,0.5

- type: entity
  parent: CMUMultiZStairsNoPreview
  id: CMUMultiZStairsKutjevoSolo
  components:
  - type: Sprite
    drawdepth: WallMountedItems
    noRot: true
    sprite: _CMU14/Structures/stairs.rsi
    state: p_stair_kutjevo_solo_cap
    offset: 0,0.5

- type: entity
  parent: CMUMultiZStairsNoPreview
  id: CMUMultiZStairsStrataSolo
  components:
  - type: Sprite
    drawdepth: WallMountedItems
    noRot: true
    sprite: _CMU14/Structures/stairs.rsi
    state: p_stair_strata_solo_cap
    offset: 0,0.5

- type: entity
  parent: BaseItem
  id: CMUDeployableZLevelLadder
  name: retractable ladder
  description: A portable ladder that can be deployed against objects to traverse z-levels.
  components:
  - type: Sprite
    sprite: _AU14/Structures/deployableladder.rsi
    state: icon
  - type: Item
    sprite: _AU14/Structures/deployableladder.rsi
    size: Large
  - type: CMUDeployableZLevelLadder
    upLadderPrototype: CMUDeployableZLevelLadderThroughUp
    downLadderPrototype: CMUDeployableZLevelLadderThroughDown

- type: entity
  parent: CMUZLevelLadderThrough
  id: CMUDeployableZLevelLadderThroughUp
  suffix: Deployable, Up
  components:
  - type: Sprite
    sprite: _AU14/Structures/deployableladder.rsi
    drawdepth: WallTops
    state: deployed

- type: entity
  parent: CMUZLevelLadderThroughDown
  id: CMUDeployableZLevelLadderThroughDown
  suffix: Deployable, Down
  components:
  - type: Sprite
    sprite: _AU14/Structures/deployableladder.rsi
    drawdepth: WallTops
    state: deployed
