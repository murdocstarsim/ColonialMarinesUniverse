    changeBrain: false
    canUseGuns: true
    hideGeneration: true
    useHumanHealthIcons: true
    hideXenoSynthIcon: true
  - type: GhostTakeoverAvailable
  - type: GhostRoleApplySpecial
    squad: SquadPMC
  - type: GhostRole
    makeSentient: true
    allowSpeech: true
    allowMovement: true
