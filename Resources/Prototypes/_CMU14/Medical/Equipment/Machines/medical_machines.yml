- type: entity
  parent: BaseStructure
  id: CMUAutodocPod
  name: autodoc pod
  description: An automated surgical pod. A trained surgeon can queue procedures from its linked console.
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
    noRot: true
  - type: Sprite
    sprite: _CMU14/Structures/Machines/Medical/autodoc.rsi
    drawdepth: Mobs
    noRot: true
    layers:
    - state: autodoc_open
      map: [ "base" ]
    - state: autodoc_closed
      map: [ "closed" ]
      visible: false
    - state: autodoc_closed_operate
      map: [ "operate" ]
      visible: false
  - type: Icon
    sprite: _CMU14/Structures/Machines/Medical/autodoc.rsi
    state: autodoc_open
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        density: 200
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: InteractionOutline
  - type: CMOperatingTable
  - type: CMUAutodocPod
  - type: ContainerContainer
    containers:
      cmu-autodoc-bodyContainer: !type:ContainerSlot
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.CMUMedicalPodVisuals.Occupied:
        base:
          True: { visible: false }
          False: { visible: true }
        closed:
          True: { visible: true }
          False: { visible: false }
      enum.CMUAutodocVisuals.Operating:
        closed:
          True: { visible: false }
        operate:
          True: { visible: true }
          False: { visible: false }
  - type: EmptyOnMachineDeconstruct
    containers:
    - cmu-autodoc-bodyContainer
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StrongMetallic
  - type: RMCMesonsNonviewable

- type: entity
  parent: BaseStructure
  id: CMUAutodocConsole
  name: autodoc console
  description: A dedicated terminal for queuing procedures on a nearby autodoc pod.
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _CMU14/Structures/Machines/Medical/autodoc.rsi
    drawdepth: Objects
    layers:
    - state: sleeperconsole
  - type: Icon
    sprite: _CMU14/Structures/Machines/Medical/autodoc.rsi
    state: sleeperconsole-p
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.35,0.25,0.35"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: InteractionOutline
  - type: Rotatable
  - type: Anchorable
  - type: ActivatableUI
    key: enum.CMUAutodocUIKey.Key
  - type: UserInterface
    interfaces:
      enum.CMUAutodocUIKey.Key:
        type: CMUAutodocBui
  - type: CMUAutodocConsole
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Electronic
  - type: RMCMesonsNonviewable

- type: entity
