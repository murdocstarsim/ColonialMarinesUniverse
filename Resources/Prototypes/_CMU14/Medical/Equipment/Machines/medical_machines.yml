- type: entity
  parent: BaseStructure
  id: CMULimbPrinter
  name: limb printer
  description: A surgical bioprinter that grows replacement human limbs from matrix reagent and fabricates robotic limbs from metal sheets.
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
    noRot: true
  - type: Sprite
    sprite: _CMU14/Structures/Machines/Medical/limbprinter.rsi
    drawdepth: Objects
    noRot: true
    layers:
    - state: bioprinter
      map: [ "base" ]
    - state: bioprinter_working
      map: [ "working" ]
      visible: false
  - type: Icon
    sprite: _CMU14/Structures/Machines/Medical/limbprinter.rsi
    state: bioprinter
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: InteractionOutline
  - type: Anchorable
  - type: ActivatableUI
    key: enum.CMULimbPrinterUIKey.Key
  - type: UserInterface
    interfaces:
      enum.CMULimbPrinterUIKey.Key:
        type: CMULimbPrinterBui
  - type: ItemSlots
    slots:
      cmu-limb-printer-beakerSlot:
        name: cmu-limb-printer-slot-beaker
        startingItem: CMULimbPrinterMatrixBeaker
        whitelist:
          components:
          - FitsInDispenser
      cmu-limb-printer-syringeSlot:
        name: cmu-limb-printer-slot-syringe
        whitelist:
          tags:
          - Syringe
      cmu-limb-printer-materialSlot:
        name: cmu-limb-printer-slot-metal
        whitelist:
          tags:
          - RMCSheetMetal
  - type: ContainerContainer
    containers:
      cmu-limb-printer-beakerSlot: !type:ContainerSlot
      cmu-limb-printer-syringeSlot: !type:ContainerSlot
      cmu-limb-printer-materialSlot: !type:ContainerSlot
  - type: CMULimbPrinter
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.CMULimbPrinterVisuals.Working:
        base:
          True: { visible: false }
          False: { visible: true }
        working:
          True: { visible: true }
          False: { visible: false }
  - type: EmptyOnMachineDeconstruct
    containers:
    - cmu-limb-printer-beakerSlot
    - cmu-limb-printer-syringeSlot
    - cmu-limb-printer-materialSlot
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Electronic
  - type: RMCMesonsNonviewable

- type: entity
  parent: CMBeakerLarge
  id: CMULimbPrinterMatrixBeaker
  name: biogenic matrix beaker
  suffix: CMU, Filled
  components:
  - type: Label
    currentLabel: biogenic matrix
  - type: SolutionContainerManager
    solutions:
      beaker:
        maxVol: 120
        reagents:
        - ReagentId: CMUBiogenicMatrix
          Quantity: 120
