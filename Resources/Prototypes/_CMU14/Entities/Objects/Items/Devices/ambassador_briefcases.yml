        points: 5
      - id: RMCZippo
        points: 5
      - id: RMCZippoGold
        points: 10
    - name: Edibles
      entries:
      - id: CMMRE
        points: 5
    - name: Drinkables
      entries:
      - id: RMCDrinkAlcoholWhiskey
        points: 5
      - id: RMCDrinkAlcoholRum
        points: 5
      - id: RMCDrinkAlcoholTequila
        points: 5
      - id: RMCDrinkAlcoholKahlua
        points: 5
      - id: RMCDrinkAlcoholDavenport
        points: 5
      - id: RMCDrinkGlass
        points: 1
    - name: Stationary
      entries:
      - id: CMPenClicky
        points: 1
      - id: CMPaper
        points: 1
      - id: CMClipboard
        points: 1
    - name: Misc
      entries:
      - id: RMCHollowCane
        name: hollow cane
        points: 10
      - id: AU14PatchUAFlag
        points: 1
    - name: Weapons & Ammo # UA = cheaper guns
      entries:
      - id: CMWeaponPistolM1984
        points: 15
      - id: CMMagazinePistolM1984
        points: 10
