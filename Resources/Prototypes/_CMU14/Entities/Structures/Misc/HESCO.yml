- type: entity
  id: AU14BaseStructureDynamicNoAnchor
  parent: BaseStructure
  abstract: true
  components:
  # These might/might not be a good idea
  #  - type: MovedByPressure
  #  - type: DamageOnHighSpeedImpact
  #  - type: TileFrictionModifier
  #    modifier: 0.5
  - type: Transform
    anchored: false
  - type: Clickable
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 60
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable

- type: entity
  parent: AU14BaseStructureDynamicNoAnchor
  id: AU14HESCOBarrier
  name: HESCO wall
  description: A fully raised and packed HESCO wall. Solid enough to stop bullets and block sight entirely.
  components:
  - type: Transform
    anchored: true
  - type: InteractionOutline
  - type: Barricade
  - type: Damageable
    damageContainer: Inorganic
  - type: Construction
    graph: AU14HESCOGraph
    node: nodeFilled
  - type: HescoDisassemblable
    previousStage: AU14HescoTallBuilding1
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1125
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 1125
      behaviors:
      - !type:EmptyAllContainersBehaviour
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Sprite
    sprite: _AU14/Structures/hesco.rsi
    state: sand_wall_tall_complete
  - type: Physics
    bodyType: Static
  - type: Appearance
  - type: Flamability
    chance: 0.2
    rate: 18.8
    range: 0.4
    spread: 0.2
  - type: Occluder
    boundingBox: "-0.49,-0.45,0.49,-0.15"
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeAabb
          bounds: "-0.49,-0.45,0.49,-0.15"
        mask:
        - FullTileMask
        layer:
        - WallLayer
