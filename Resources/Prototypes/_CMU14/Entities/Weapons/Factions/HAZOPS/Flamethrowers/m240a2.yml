- type: entity
  parent: [ CMBaseWeaponGun, BaseItem, RMCBaseAttachableHolder ]
  id: AU14WeaponFlamerM240A2HAZOPS
  name: M240A2 heavy incinerator unit
  description: The USCMC's answer to WY's Flammerwerfer 3. Much more effective than the standard M240, but inflicts a movement penality. Typically issued to HAZOPS.
  components:
  - type: RMCMagneticItem
  - type: Sprite
    sprite: _AU14/Weapons/Guns/HAZOPS/M240A2.rsi
    state: base
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
    - state: lit
      map: ["enum.RMCIgniterVisuals.Ignited"]
  - type: Item
    sprite: _AU14/Weapons/Guns/HAZOPS/M240A2.rsi
    size: Large
  - type: Clothing
    sprite: _AU14/Weapons/Guns/HAZOPS/M240A2.rsi
    slots:
    - suitStorage
    - Back
  - type: Gun
    cameraRecoilScalar: 0
    fireRate: 0.8
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      collection: RMCFlamerShoot
  - type: ShootUseDelay
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Tank
        startingItem: AU14TankFlamerM240A2HAZOPS
        insertSound: /Audio/_RMC14/Weapons/Handling/flamer_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Handling/flamer_unload.ogg
        priority: 2
        whitelist:
          tags:
          - AU14TankFlamerM240A2HAZOPS
          - AU14TankFlamerM240A2HAZOPSNapalmB
          - AU14TankFlamerM240A2HAZOPSNapalmX
  - type: Wieldable
  - type: WieldableSpeedModifiers
    base: 0.70
    light: 0.69
    medium: 0.75
    heavy: 0.806
  - type: GunRequiresWield
  - type: RMCFlamerAmmoProvider
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-rail: -0.032, 0.092
      rmc-aslot-underbarrel: 0.284, -0.313
  - type: WieldedCrosshair
    rsi:
      sprite: _RMC14/Interface/MousePointer/flamer_mouse.rsi
      state: all
  - type: RMCIgniter
  - type: RMCAmmoEject
  - type: GenericVisualizer
    visuals:
      enum.RMCFlamerVisualLayers.Strip:
        enum.RMCFlamerVisualLayers.Strip:
          True: { visible: true }
          False: { visible: false }
      enum.RMCIgniterVisuals.Ignited:
        enum.RMCIgniterVisuals.Ignited:
          True: { visible: true }
          False: { visible: false }
  - type: Tag
    tags:
    - AU14WeaponFlamerM240A2HAZOPS
  - type: RMCNameItemOnVend
    item: PrimaryGun

- type: Tag
  id: AU14WeaponFlamerM240A2HAZOPS


- type: entity
  parent: RMCTankFlamer
  id: AU14TankFlamerM240A2HAZOPS
  name: M240A2 heavy incinerator tank
  description: A heavy, high capacity tank utilized by the M240A2. Has a colorless HAZOPS logo imprinted on the side.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/fl3.rsi
    state: flametank
    layers:
    - state: flametank
    - state: flametank_strip1
    - state: flametank_strip2
      map: [ "enum.SolutionContainerLayers.Fill" ]
  - type: RMCFlamerTank
    maxIntensity: 70
    maxRange: 7
  - type: SolutionContainerManager
    solutions:
      rmc_flamer_tank:
        maxVol: 300
        reagents:
        - ReagentId: RMCNapalmUT
          Quantity: 300
  - type: SolutionContainerVisuals
    maxFillLevels: 2
    fillBaseName: flametank_strip
  - type: Tag
    tags:
    - AU14TankFlamerM240A2HAZOPS

- type: Tag
  id: AU14TankFlamerM240A2HAZOPS


