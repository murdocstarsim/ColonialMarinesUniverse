- type: entity
  id: VehicleTankBase
  abstract: true
  name: M34A2 Longstreet
  description: "An older light tank made for all ground forces of the United Americas, although being phased out due to being outdated by the American Army and the CCAF, the longstreet still remains in service with USCM and LACN detachments in colonial sectors."
  components:
  - type: Vehicle
    movementKind: Grid
  - type: Clickable
  - type: Tag
    tags:
    - VehicleHeavy
  - type: RMCIgnoreGhostInteractionLimits
  - type: RequireProjectileTarget
  - type: GridVehicleMover
    maxSpeed: 2.5
    acceleration: 1.154
    deceleration: 8
    maxReverseSpeed: 2
    reverseAcceleration: 1.154
    turnDelay: 1
    turnInPlace: true
    turnInPlaceMaxSpeed: 0.5
    pushCooldown: 2
    canPushVehicles: true
    blockingMobBypassNudgeLimit: 2
    xenoBlockMinimumSize: Immobile
    canXenosPush: false
    canSmashWalls: true
    wallSmashMinSpeed: 1.5
    wallSmashWheelDamage: 0.6
    wallSmashHullDamage: 12
    wallSmashSlowdownMultiplier: 0.2
    wallSmashSlowdownDuration: 1.5
    speedAtZeroIntegrity: 0.7
  - type: VehicleRideSurface
    bounds:
    - -1.3,-1.9,1.3,1.9
    climbBounds:
    - -1.8,1.8,1.8,2.8
  - type: VehicleOvercharge
    speedMultiplier: 1.2
    duration: 5
    cooldown: 24
    overchargeSound:
      path: /Audio/_RMC14/Vehicle/tank_boost_rev.wav
      params:
        volume: -5
        pitch: 0.6
  - type: VehicleSound
    runningSound:
      path: /Audio/_RMC14/Vehicle/tank_engine_loop.wav
      params:
        volume: -6
    runningSoundCooldown: 3.2
    hornSound: /Audio/_RMC14/Vehicle/honk_2_truck.ogg
    hornCooldown: 1
    collisionSound:
      path: /Audio/Effects/metal_slam3.ogg
      params:
        volume: -3
        pitch: 0.8
    collisionSoundCooldown: 1.5
    collisionSoundMinSpeed: 2.5
    mobCollisionSound: /Audio/_RMC14/Xeno/alien_claw_block.ogg
  - type: VehicleSpotlight
    radius: 8
    energy: 3
    softness: 2
  - type: Physics
    bodyType: Dynamic
  #CMU
  - type: CMUZPhysics
  - type: CMUVehicleZTraversal
  - type: CMUZLevelViewer
  - type: Fixtures
    fixtures:
      world:
        shape:
          !type:PhysShapeAabb
          bounds: -1.2,-1.6,1.2,1.6
        density: 1500
        mask:
        - Impassable
        - HighImpassable
        - LowImpassable
        - LargeMobLayer
        layer:
        - LargeMobLayer
      mob:
        shape:
          !type:PhysShapeAabb
          bounds: -1.2,-1.6,1.2,1.6
        density: 1500
        mask:
        - MidImpassable
        - BarricadeImpassable
        - LargeMobLayer
        layer:
        - LargeMobLayer
  - type: Damageable
    damageContainer: StructuralMarine
    damageModifierSet: VehicleFrameTank
  - type: ReceiverXenoClaws
    minimumClawStrength: Sharp
  - type: InteractionOutline
  - type: Sprite
    drawdepth: Mobs
    sprite: _RMC14/Structures/Vehicles/tank.rsi
    layers:
    - map: [ base ]
      state: tank_base
    - map: [ armor ]
      state: ARMOR
      visible: false
    - map: [ primary ]
      state: tank_turret_0
    - map: [ secondary ]
      state: SECONDARY
      visible: false
    - map: [ support ]
      state: SUPPORT
      visible: false
    - map: [ rmc-wheels ]
      state: wheels_1
  - type: SpriteMovement
    movementLayers:
      rmc-wheels:
        state: wheels_0
    noMovementLayers:
      rmc-wheels:
        state: wheels_1
  - type: PointLight
    enabled: false
    radius: 12
    energy: 3
    softness: 2
    autoRot: true
    offset: "0,0.9"
  - type: Corrodible
    isCorrodible: false
  - type: DoAfter
  - type: UserInterface
    interfaces:
      enum.HardpointUiKey.Key:
        type: HardpointBoundUserInterface
      enum.VehicleWeaponsUiKey.Key:
        type: VehicleWeaponsBoundUserInterface
  - type: VehicleWeapons
  - type: VehicleHardpointVisuals
  - type: InputMover
  - type: ItemSlots
    slots:
      armor:
        disableEject: true
        whitelist:
          components:
          - HardpointItem
      primary:
        startingItem: VehicleTankTurret
        disableEject: true
        whitelist:
          components:
          - HardpointItem
      secondary:
        disableEject: true
        whitelist:
          components:
          - HardpointItem
      support:
        disableEject: true
        whitelist:
          components:
          - HardpointItem
      wheel-1:
        startingItem: VehicleTankTreads
        disableEject: true
        whitelist:
          components:
          - VehicleWheelItem
  - type: HardpointSlots
    vehicleFamily: Tank
    slots:
    - id: armor
      hardpointType: Armor
      slotType: Armor
      visualLayer: armor
      insertDelay: 2.5
      required: false
    - id: primary
      hardpointType: Turret
      slotType: Turret
      visualLayer: primary
      insertDelay: 3.0
      required: false
    - id: secondary
      hardpointType: Secondary
      visualLayer: secondary
      insertDelay: 2.5
      required: false
    - id: support
      hardpointType: Support
      slotType: SupportAttachment
      visualLayer: support
      insertDelay: 2.0
      required: false
    - id: wheel-1
      hardpointType: Wheel
      slotType: Treads
      insertDelay: 2.0
  - type: VehicleWheelSlots
    slotCount: 1
  - type: HardpointIntegrity
    maxIntegrity: 1000
    bypassEntryOnZero: true
  - type: Appearance
  - type: VehicleEnter
    interiorPath: /Maps/_RMC14/Vehicles/tank_interior.yml
    enterDoAfter: 1.0
    exitDoAfter: 1.0
    maxPassengers: 4
    maxXenos: 2
    entryPoints:
    - offset: 0,2
      radius: 1
      interiorCoords: 0.5,-1

- type: entity
  parent: VehicleTankBase
  id: VehicleTank
  components:
  - type: MarineMapTracked
  - type: TacticalMapTracked
  - type: TacticalMapIcon
    icon:
      sprite: /Textures/_RMC14/Interface/map_blips_large.rsi
      state: tank

- type: entity
  parent: VehicleTankBase
  id: VehicleAev
  name: M34E1 Armored Engineering Vehicle
  description: An unarmed engineering vehicle built on the chassis of a Longstreet Tank, fitted with a reinforced plow, built for hauling personnel/cargo and clearing enemy defenses without interrupting the flow of combat.
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _RMC14/Structures/Vehicles/tank.rsi
    layers:
    - map: [ base ]
      state: aev_base
    - map: [ armor ]
      state: ARMOR
      visible: false
    - map: [ support ]
      state: SUPPORT
      visible: false
    - map: [ rmc-wheels ]
      state: wheels_1
  - type: ItemSlots
    slots:
      armor:
        startingItem: VehicleTankSnowplow
        disableEject: true
        whitelist:
          components:
          - HardpointItem
      support:
        startingItem: VehicleTankOverdriveEnhancer
        disableEject: true
        whitelist:
          components:
          - HardpointItem
      wheel-1:
        startingItem: VehicleTankTreads
        disableEject: true
        whitelist:
          components:
          - VehicleWheelItem
  - type: HardpointSlots
    vehicleFamily: Tank
    slots:
    - id: armor
      hardpointType: Armor
      slotType: Armor
      visualLayer: armor
      insertDelay: 2.5
      required: false
    - id: support
      hardpointType: Support
      slotType: SupportAttachment
      visualLayer: support
      insertDelay: 2.0
      required: false
    - id: wheel-1
      hardpointType: Wheel
      slotType: Treads
      insertDelay: 2.0
  - type: HardpointIntegrity
    maxIntegrity: 1500
    bypassEntryOnZero: true
  - type: GridVehicleMover
    maxSpeed: 1.8
    acceleration: 0.9
    deceleration: 9
    maxReverseSpeed: 0.5
    reverseAcceleration: 0.7
    turnDelay: 1
    turnInPlace: true
    turnInPlaceMaxSpeed: 0.4
    pushCooldown: 2
    canPushVehicles: true
    blockingMobBypassNudgeLimit: 2
    xenoBlockMinimumSize: Immobile
    canXenosPush: false
    canSmashWalls: true
    wallSmashMinSpeed: 0.1
    wallSmashWheelDamage: 0.1
    wallSmashHullDamage: 0.1
    wallSmashSlowdownMultiplier: 0.1
    wallSmashSlowdownDuration: 0.2
    speedAtZeroIntegrity: 0.7
  - type: VehicleEnter
    interiorPath: /Maps/_CMU14/Vehicles/arv.yml
    enterDoAfter: 1.0
    exitDoAfter: 1.0
    maxPassengers: 8
    maxXenos: 0
    entryPoints:
    - offset: 0,2
      radius: 1
      interiorCoords: -1.3,-1
  - type: RemoveComponents
    components:
    - type: VehicleWeapons

