# CBRN

- type: entity
  parent: RMCMarineUniformBase
  id: RMCCBRNSuit
  name: M3 MOPP Suit
  description: M3 MOPP suits are specially designed and engineered to protect the wearer from unshielded exposure to any Chemical, Biological, Radiological, or Nuclear (CBRN) threats in the field. The suit has a recommended lifespan of twenty-four hours once contact with a toxic environment is made, but depending on the severity this can be shortened to eight hours or less.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/Marine/cbrnsuit.rsi
  - type: CMArmor
    bullet: 10
    melee: 10
    bio: 100
    explosionArmor: 10
  - type: ToggleableClothing
    action: ActionToggleCBRNHelmet
    clothingPrototype: RMCArmorHelmetCBRN
    slot: head
    requiredSlot: INNERCLOTHING

