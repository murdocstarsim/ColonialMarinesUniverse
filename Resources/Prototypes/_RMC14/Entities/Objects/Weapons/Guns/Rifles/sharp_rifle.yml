    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Projectiles/sharp_darts.rsi
    drawdepth: Effects
    layers:
    - state: sharp_explosive_dart
      shader: unshaded
  - type: DeleteOnFixedDistanceStop
  - type: Projectile
    deleteOnCollide: true
    impactEffect: BulletImpactEffect
    maxFixedRange: 7
    damage:
      types:
        Piercing: 35
    soundHit:
      path: /Audio/Weapons/Guns/Hits/bullet_hit.ogg
  - type: RMCProjectileAccuracy
    accuracy: 105
    thresholds:
    - range: 12
      falloff: 0
  - type: RMCProjectileDamageFalloff
    thresholds:
    - range: 7
      falloff: 9999
      ignoreModifiers: true
  - type: SharpProjectile
    kind: Explosive
    mine: RMCSharpExplosiveDartMine
    directEffect: RMCSharpExplosiveDirectEffect

- type: entity
