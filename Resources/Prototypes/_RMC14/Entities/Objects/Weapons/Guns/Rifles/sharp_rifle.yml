- type: entity
  parent: [ CMBaseWeaponRifle, RMCBaseWeaponMagazineVisuals ]
  id: RMCWeaponRifleSharp
  name: P9 SHARP rifle
  description: An experimental harpoon launcher rifle, produced by AEGIS Armaments. It uses specialized 9X dart magazines and is designed to deny areas with embedded explosive and incendiary payloads.
  components:
  - type: GuideHelp
    guides:
    - RMCGuideRoleSpecGrenadier
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Rifles/sharp/sharp_inhands.rsi
    layers:
    - state: base
      sprite: _RMC14/Objects/Weapons/Guns/Rifles/sharp/sharp_icon.rsi
      map: [ "enum.GunVisualLayers.Base" ]
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/Rifles/sharp/sharp_inhands.rsi
  - type: SharpGun
  - type: GunRequiresWield
  - type: GunIFF
    enabled: true
  - type: ShootAtFixedPoint
    maxFixedRange: 7
  - type: RMCSelectiveFire
    baseFireModes:
    - SemiAuto
    recoilWielded: 0
    recoilUnwielded: 0
    scatterWielded: 0
    scatterUnwielded: 0
    baseFireRate: 0.2125
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 1
    accuracyMultiplierUnwielded: 1
  - type: Gun
    projectileSpeed: 20
    shotsPerBurst: 1
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/_RMC14/Weapons/Guns/Gunshots/gun_sharp.ogg
  - type: GunUserWhitelist
    whitelist:
      components:
      - SharpSpecWhitelist
  - type: Corrodible
    isCorrodible: false
  - type: ExplosionResistance
    damageCoefficient: 0
  - type: AttachableHolder
    slots:
      rmc-aslot-rail:
        whitelist:
          tags:
          - RMCAttachmentMagneticHarness
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-rail: 0.0, 0.185
  - type: WieldableSpeedModifiers
    base: 0.725
    light: 1
    medium: 1
    heavy: 1
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/l42_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/l42_unload.ogg
        priority: 2
        startingItem: RMCMagazineRifleSharpExplosive
        whitelist:
          tags:
          - RMCMagazineRifleSharp
  - type: Item
    size: Huge
  - type: Tag
    tags:
    - RMCWeaponRifleSharp

- type: entity
