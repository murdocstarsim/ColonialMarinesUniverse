  name: 9X-E sticky explosive dart magazine
  description: A specialized P9 SHARP rifle magazine loaded with sticky explosive darts.
  components:
  - type: Tag
    tags:
    - CMMagazineRifle
    - RMCMagazineRifleSharp
  - type: BallisticAmmoProvider
    mayTransfer: false
    proto: RMCCartridgeRifleSharpExplosive
    capacity: 10
    whitelist:
      tags:
      - RMCCartridgeRifleSharp
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/sharp.rsi
    layers:
