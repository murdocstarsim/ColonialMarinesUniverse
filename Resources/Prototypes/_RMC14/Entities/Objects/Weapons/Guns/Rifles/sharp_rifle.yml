- type: entity
  parent: BaseItem
  id: RMCSharpExplosiveDartMine
  name: SHARP explosive dart mine
  description: A SHARP explosive dart embedded in the ground. It deploys into a proximity mine shortly after landing and grows more dangerous the longer it is left armed.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Explosives/Mines/sharp_darts.rsi
    drawdepth: BelowMobs
    layers:
    - state: sharp_explosive_mine
      map: [ "enum.SharpMineVisuals.Layer" ]
  - type: Fixtures
    fixtures:
      trigger:
        shape:
          !type:PhysShapeAabb
          bounds: "-1.5,-1.5,1.5,1.5"
        hard: false
        layer:
        - Opaque
        mask:
        - MobLayer
      hitbox:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        hard: false
        layer:
        - BulletImpassable
        - XenoProjectileImpassable
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 20
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.SharpMineVisuals.State:
        enum.SharpMineVisuals.Layer:
          Inactive: { state: sharp_explosive_mine }
          Active1: { state: sharp_explosive_mine_active }
          Active2: { state: sharp_explosive_mine_active_2 }
          Active3: { state: sharp_explosive_mine_active_3 }
          Active4: { state: sharp_explosive_mine_active_4 }
          Disarmed: { state: sharp_mine_disarmed }
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:TriggerBehavior
  - type: RMCLandmine
    placementDelay: 3
    disarmDelay: 3
    shotStackLimit: 1
    triggerOnAnyProjectile: true
    deploySound:
      path: /Audio/_RMC14/Weapons/Guns/Gunshots/gun_sharp_explode.ogg
  - type: SharpMine
    kind: Explosive
    triggerRadius: 1.5
    effects:
    - RMCSharpExplosiveMineEffect1
    - RMCSharpExplosiveMineEffect2
    - RMCSharpExplosiveMineEffect3
    - RMCSharpExplosiveMineEffect4
  - type: StepTrigger
    active: false
    requiredTriggeredSpeed: 0
  - type: RMCMesonsNonviewable
  - type: Flammable
    fireSpread: false
    damage:
      types:
        Heat: 1
  - type: Tag
    tags:
    - RMCSharpDartMine

- type: entity
  parent: RMCSharpExplosiveDartMine
  id: RMCSharpIncendiaryDartMine
  name: SHARP incendiary dart mine
  description: A SHARP incendiary dart embedded in the ground. It deploys into a proximity mine shortly after landing and grows more dangerous the longer it is left armed.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Explosives/Mines/sharp_darts.rsi
    layers:
    - state: sharp_incendiary_mine
      map: [ "enum.SharpMineVisuals.Layer" ]
  - type: GenericVisualizer
    visuals:
      enum.SharpMineVisuals.State:
        enum.SharpMineVisuals.Layer:
          Inactive: { state: sharp_incendiary_mine }
          Active1: { state: sharp_incendiary_mine_active }
          Active2: { state: sharp_incendiary_mine_active_2 }
          Active3: { state: sharp_incendiary_mine_active_3 }
          Active4: { state: sharp_incendiary_mine_active_4 }
          Disarmed: { state: sharp_mine_disarmed }
  - type: SharpMine
    kind: Incendiary
    inactiveState: sharp_incendiary_mine
    activeState: sharp_incendiary_mine_active
    effects:
    - RMCSharpIncendiaryMineEffect1
    - RMCSharpIncendiaryMineEffect2
    - RMCSharpIncendiaryMineEffect3
    - RMCSharpIncendiaryMineEffect4

