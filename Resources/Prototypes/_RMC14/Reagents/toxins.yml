- type: reagent
  parent: CMReagent
  id: RMCChloralhydrate
  name: reagent-name-rmc-chloral-hydrate
  desc: reagent-desc-rmc-chloral-hydrate
  physicalDesc: reagent-physical-desc-nondescript
  color: "#000067"
  flavor: bitter
  unknown: true
  toxin: true
  overdose: 15
  criticalOverdose: 25
  metabolisms:
    Poison:
      metabolismRate: 0.05
      effects:
      - !type:Toxic
        potency: 1
      - !type:Emote # Sedative 6
        emote: Yawn
        showInChat: true
        probability: 0.25 #TODO makes them confused and eventually sleepy
      - !type:GenericStatusEffect
        conditions:
        - !type:ReagentThreshold
          min: 15
        key: Unconscious
        component: RMCUnconscious
        type: Add
        time: 3
        refresh: false
      - !type:HealthChange
        conditions:
        - !type:ReagentThreshold
          min: 25
        damage:
          types:
            Asphyxiation: 15

