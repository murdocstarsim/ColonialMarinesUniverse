    canInteract: true
  - type: Hands
    hands:
      hand_right:
        location: Right
      hand_left:
        location: Left
    sortedHands:
    - hand_right
    - hand_left
  - type: Thieving
    stripTimeReduction: 9999
    stealthy: true

- type: entity
  parent: RMCImaginaryFriend
  id: RMCImaginaryFriendXeno
  categories: [ HideSpawnMenu ]
  name: Xippy
  components:
  - type: Sprite
    sprite: _RMC14/Mobs/Xenonids/LesserDrone/lesser_drone.rsi
    color: "#FFFFFF"
    layers:
    - state: alive
      shader: ""
  - type: Language
    spokenLanguages:
    - Xeno
    understoodLanguages:
    - Xeno
    currentLanguage: Xeno
    defaultLanguage: Xeno
  - type: Speech
    speechSounds: Xenonid

- type: startingGear
  id: RMCMobXippyGear
  equipment:
    head: RMCHeadCapDrillXippy
