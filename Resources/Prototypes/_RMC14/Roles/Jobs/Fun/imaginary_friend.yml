- type: entity
  parent: [MobObserver, InventoryBase]
  id: RMCImaginaryFriend
  name: Imaginary Friend
  description: A wonderful yet fake friend.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Mobs/Ghosts/ghost_human.rsi
    color: "#fff8"
  - type: ImaginaryFriend
  - type: MovementSpeedModifier
    baseSprintSpeed: 6
    baseWalkSpeed: 2.7
  - type: Inventory
    templateId: human
  - type: Appearance
  - type: Speech
    speechSounds: Alto

- type: entity
  parent: RMCImaginaryFriend
  id: RMCImaginaryFriendHumanoid
  categories: [ HideSpawnMenu ]
  components:
